<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Flying Buds icon">
  <title>@iBzA Flying Buds</title>
  <defs>
    <linearGradient id="fbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11151c"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="fbBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcd6b"/>
      <stop offset="1" stop-color="#f6b53c"/>
    </linearGradient>
    <linearGradient id="fbWing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38e1c2"/>
      <stop offset="1" stop-color="#1aa589"/>
    </linearGradient>
    <radialGradient id="fbGlow" cx="0.55" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#f6b53c" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#f6b53c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#fbBg)" stroke="#1aa589" stroke-opacity="0.30" stroke-width="2"/>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#fbGlow)"/>

  <!-- motion trail (speed dashes) -->
  <g stroke-linecap="round">
    <line x1="46" y1="120" x2="92" y2="120" stroke="#f6b53c" stroke-opacity="0.30" stroke-width="9"/>
    <line x1="52" y1="146" x2="86" y2="146" stroke="#f6b53c" stroke-opacity="0.20" stroke-width="8"/>
    <line x1="58" y1="96" x2="84" y2="96" stroke="#1aa589" stroke-opacity="0.30" stroke-width="7"/>
  </g>

  <!-- origami bird: angular body -->
  <!-- main body -->
  <path d="M96 128 L150 96 L196 120 L150 138 Z" fill="url(#fbBody)"/>
  <!-- head/beak -->
  <path d="M196 120 L214 116 L198 132 Z" fill="#ff4d4d"/>
  <!-- upper wing (teal) -->
  <path d="M150 96 L132 60 L172 92 Z" fill="url(#fbWing)"/>
  <!-- lower wing fold -->
  <path d="M96 128 L150 138 L120 160 Z" fill="#c98a1e"/>
  <!-- eye -->
  <circle cx="186" cy="118" r="4.6" fill="#0b0e13"/>
</svg>
