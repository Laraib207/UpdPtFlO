<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="iBzA icon">
  <title>@iBzA</title>
  <defs>
    <linearGradient id="ibzaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11151c"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="ibzaAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcd6b"/>
      <stop offset="1" stop-color="#f6b53c"/>
    </linearGradient>
    <radialGradient id="ibzaGlow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#f6b53c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f6b53c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- badge -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#ibzaBg)" stroke="#f6b53c" stroke-opacity="0.28" stroke-width="2"/>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#ibzaGlow)"/>

  <!-- orbit ring (open = @), gap at top-right with signal node -->
  <path d="M202.9 94.7 A82 82 0 1 1 161.3 53.1"
        fill="none" stroke="url(#ibzaAmber)" stroke-width="13" stroke-linecap="round"/>

  <!-- signal node on the gap -->
  <circle cx="186" cy="70" r="12" fill="#1aa589"/>
  <circle cx="186" cy="70" r="12" fill="none" stroke="#1aa589" stroke-opacity="0.35" stroke-width="8"/>

  <!-- "i" core -->
  <rect x="117" y="80" width="22" height="22" rx="7" fill="url(#ibzaAmber)"/>
  <rect x="117" y="116" width="22" height="72" rx="11" fill="url(#ibzaAmber)"/>
</svg>
