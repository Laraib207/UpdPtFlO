<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220" role="img" aria-label="@iBzA wordmark">
  <title>@iBzA — TheLaraib</title>
  <defs>
    <linearGradient id="wmAmber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffcd6b"/>
      <stop offset="1" stop-color="#f6b53c"/>
    </linearGradient>
  </defs>

  <!-- ===== Icon: orbital @ ===== -->
  <g transform="translate(40,40)">
    <!-- orbit ring (open) -->
    <path d="M118.6 35.4 A70 70 0 1 1 82.9 0.6"
          fill="none" stroke="url(#wmAmber)" stroke-width="12" stroke-linecap="round"/>
    <!-- signal node -->
    <circle cx="104" cy="20" r="10.5" fill="#1aa589"/>
    <!-- "i" core -->
    <rect x="59" y="24" width="19" height="19" rx="6" fill="url(#wmAmber)"/>
    <rect x="59" y="55" width="19" height="62" rx="9.5" fill="url(#wmAmber)"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <g font-family="'JetBrains Mono','Space Mono',monospace" font-weight="800">
    <text x="250" y="128" font-size="92" letter-spacing="-2">
      <tspan fill="#f6b53c">@</tspan><tspan fill="#ffffff">iBzA</tspan>
    </text>
  </g>

  <!-- tagline -->
  <text x="252" y="170" font-family="'JetBrains Mono','Space Mono',monospace"
        font-size="20" letter-spacing="8" fill="#1aa589">THELARAIB</text>
</svg>
